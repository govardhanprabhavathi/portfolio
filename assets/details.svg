    <rect x="350" y="31" width="150" height="28" rx="8" fill="#2C2C2E"/>
    <text x="425.0" y="50" text-anchor="middle" class="badge-text">🎓 B.Tech AI & ML</text>
    
    <rect x="520" y="31" width="140" height="28" rx="8" fill="#2C2C2E"/>

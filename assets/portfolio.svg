<svg width="820" height="90" viewBox="0 0 820 90" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', system-ui, sans-serif; }
    .title { font-weight: 700; font-size: 24px; fill: #FFFFFF; }
    .subtitle { font-weight: 500; font-size: 14px; fill: #A1A1A6; }
    .desc { font-weight: 400; font-size: 14px; fill: #D1D1D6; }
    .badge-text { font-weight: 600; font-size: 12px; fill: #FFFFFF; }
    .red-text { fill: #FF0000; }
</style>
<rect width="820" height="90" rx="20" fill="#1C1C1E"/>

<text x="40" y="55" class="title" font-size="20px">Portfolio</text>
<rect x="150" y="25" width="2" height="40" fill="#2C2C2E"/>

    <rect x="180" y="31" width="110" height="28" rx="8" fill="#FF0000"/>
    <text x="235.0" y="50" text-anchor="middle" class="badge-text">🌐 Live Apps</text>
    
    <rect x="310" y="31" width="100" height="28" rx="8" fill="#2C2C2E"/>
    <text x="360.0" y="50" text-anchor="middle" class="badge-text">🐙 GitHub</text>
    
    <rect x="430" y="31" width="110" height="28" rx="8" fill="#2C2C2E"/>
    <text x="485.0" y="50" text-anchor="middle" class="badge-text">💼 LinkedIn</text>
    
    <rect x="560" y="31" width="90" height="28" rx="8" fill="#2C2C2E"/>
    <text x="605.0" y="50" text-anchor="middle" class="badge-text">📧 Email</text>
    
</svg>
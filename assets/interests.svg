<svg width="580" height="80" viewBox="0 0 580 80" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', system-ui, sans-serif; }
    .title { font-weight: 700; font-size: 24px; fill: #FFFFFF; }
    .subtitle { font-weight: 500; font-size: 14px; fill: #A1A1A6; }
    .desc { font-weight: 400; font-size: 14px; fill: #D1D1D6; }
    .badge-text { font-weight: 600; font-size: 12px; fill: #FFFFFF; }
    .red-text { fill: #FF0000; }
</style>
<rect width="580" height="80" rx="20" fill="#1C1C1E"/>

<text x="30" y="45" class="title" font-size="20px">Core Focus</text>
<rect x="150" y="25" width="2" height="30" fill="#2C2C2E"/>

    <rect x="170" y="26" width="100" height="28" rx="8" fill="#2C2C2E"/>
    <text x="220.0" y="45" text-anchor="middle" class="badge-text">🤖 AI & ML</text>
    
    <rect x="285" y="26" width="110" height="28" rx="8" fill="#2C2C2E"/>
    <text x="340.0" y="45" text-anchor="middle" class="badge-text">🌐 Full-Stack</text>
    
    <rect x="410" y="26" width="145" height="28" rx="8" fill="#2C2C2E"/>
    <text x="482.5" y="45" text-anchor="middle" class="badge-text">👁️ Computer Vision</text>
    
</svg>